<style>
:root {

  --border: #ddd5c0; --border-mid: #c8bfae;
  --text: #1a1410; --text-mid: #4a3f30; --text-soft: #7a6f60;

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: "DM Sans", sans-serif; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; }
a { color: var(--green); }
::-webkit-scrollbar { height: 4px; width: 4px; }
::-webkit-scrollbar-track { background: #f0ebe0; }
::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 99px; }

/* HEADER */
.header { background: linear-gradient(160deg,#00550a 0%,#004d08 45%,#8a0000 100%); padding: 28px 20px 20px; }
.header-inner { max-width: 900px; margin: 0 auto; }
.header-eyebrow { font-size: 10px; letter-spacing: 4px; color: #c8e8c8; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }

.header p { font-size: 13px; color: #a8c8a8; margin-top: 4px; }

/* TABS */
.tabs { background: #f0ebe0; border-bottom: 1px solid var(–border); border-top: 1px solid var(–border); position: sticky; top: 0; z-index: 100; overflow-x: auto; display: flex; }
.tab-btn { padding: 12px 14px; background: none; border: none; border-bottom: 2px solid transparent; color: var(–text-soft); font-size: 13px; font-weight: 600; white-space: nowrap; transition: all .15s; }
.tab-btn.active { border-bottom-color: var(–green); color: var(–gold); }

/* CONTENT */
.content { max-width: 900px; margin: 0 auto; padding: 20px 16px 80px; }

/* CARDS */
.card { background: var(–surface); border: 1px solid var(–border); border-radius: 12px; overflow: hidden; margin-bottom: 12px; }
.card-header { background: var(–green-light); padding: 11px 16px; border-bottom: 1px solid var(–border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.card-header h3 { font-family: “Cormorant Garamond”, serif; font-size: 18px; color: var(–text); font-weight: 700; }
.card-body { padding: 14px 16px; }

/* TAGS */
.tag { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: .4px; }
.tag-green { background: var(–green-light); color: var(–green); border: 1px solid #00660033; }
.tag-red { background: var(–red-light); color: var(–red); border: 1px solid #cc000033; }
.tag-gold { background: var(–gold-light); color: var(–gold); border: 1px solid #8a6a1033; }
.tag-grey { background: var(–surface2); color: var(–text-soft); border: 1px solid var(–border); }

/* EVENTS */
.event { display: flex; gap: 10px; padding: 10px 16px; border-bottom: 1px solid #f0ebe0; align-items: flex-start; }
.event:last-child { border-bottom: none; }
.event.booked { background: #f0faf0; border-left: 3px solid var(–green); }
.event.needs-booking { background: #fffaf0; border-left: 3px solid var(–gold); }
.event-icon { font-size: 16px; width: 24px; text-align: center; flex-shrink: 0; margin-top: 2px; }
.event-body { flex: 1; min-width: 0; }
.event-title { font-weight: 600; font-size: 13px; color: var(–text); display: flex; flex-wrap: wrap; gap: 5px; align-items: center; margin-bottom: 3px; }
.event-time { font-size: 11px; background: var(–surface2); border: 1px solid var(–border); color: var(–text-soft); padding: 1px 7px; border-radius: 99px; }
.event-location { font-size: 11px; color: var(–text-soft); margin-bottom: 2px; }
.event-notes { font-size: 11px; color: var(–text-soft); line-height: 1.55; white-space: pre-wrap; }
.link-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.link-chip { font-size: 11px; color: var(–green); background: var(–green-light); border: 1px solid #00660033; border-radius: 99px; padding: 2px 9px; text-decoration: none; font-weight: 600; }

/* SECTION LABEL */
.section-label { font-size: 10px; letter-spacing: 3px; color: var(–green-mid); text-transform: uppercase; font-weight: 700; margin-bottom: 14px; }

/* GRID */
.info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; margin-bottom: 20px; }
.info-card { background: var(–surface); border: 1px solid var(–border); border-radius: 11px; padding: 12px; }
.info-card-icon { font-size: 20px; margin-bottom: 4px; }
.info-card-title { font-size: 12px; font-weight: 700; color: var(–green-mid); margin-bottom: 3px; }
.info-card-text { font-size: 12px; color: var(–text-soft); line-height: 1.5; }

/* CONTACT CARDS */
.contact-card { background: var(–surface); border: 1px solid var(–border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
.contact-card.booked { border-color: #00660033; }
.contact-name { font-weight: 600; font-size: 15px; color: var(–text); margin-bottom: 2px; }
.contact-role { font-size: 12px; color: var(–text-soft); margin-bottom: 8px; }
.contact-address { font-size: 12px; color: var(–text-soft); margin-bottom: 8px; }
.contact-links { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 6px; }
.contact-link { font-size: 12px; padding: 3px 10px; border-radius: 99px; text-decoration: none; font-weight: 600; }

.contact-link.email { color: var(–gold); background: var(–gold-light); border: 1px solid #8a6a1033; }
.contact-link.web { color: #6030c0; background: #f0eafa; border: 1px solid #6030c033; }
.contact-link.maps { color: var(–green); background: var(–green-light); border: 1px solid #00660033; }
.contact-note { font-size: 11px; color: var(–text-soft); }

.room-header { background: var(–gold-light); padding: 12px 16px; border-bottom: 1px solid var(–border); display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; }

.room-type { font-size: 12px; color: var(–text-soft); margin-top: 2px; }

.room-field-label { font-size: 10px; color: var(–text-soft); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
.room-field-value { font-size: 13px; color: var(–text); }
.room-id { font-family: monospace; font-size: 13px; color: var(–green); font-weight: 700; letter-spacing: 1px; }
.room-warning { margin: 0 16px 12px; background: var(–red-light); border: 1px solid #cc000033; border-radius: 8px; padding: 7px 11px; font-size: 12px; color: var(–red); }

/* FLIGHTS */
.flight-row { background: var(–surface); border: 1px solid var(–border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }

.flight-name { font-weight: 600; font-size: 13px; color: var(–text); min-width: 120px; }

.flight-route { font-size: 12px; color: var(–text-soft); }
.flight-time { font-size: 12px; color: var(–text-soft); }

.budget-table td { padding: 8px 10px; text-align: center; border-bottom: 1px solid #f0ebe0; }
.budget-table td:first-child { text-align: left; padding-left: 14px; }
.budget-table tr:last-child td { border-bottom: none; }

.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(105px,1fr)); gap: 10px; margin-bottom: 16px; }
.summary-card { background: var(–surface); border: 1px solid var(–border); border-radius: 10px; padding: 12px; }

.summary-value { font-family: “Cormorant Garamond”, serif; font-size: 24px; font-weight: 700; color: var(–gold); }
.summary-value.benjie { color: var(–green); }
.summary-sub { font-size: 10px; color: var(–text-soft); margin-top: 2px; }

/* HIDDEN */
.hidden { display: none; }
</style>

  const { total, ppCost, present } = exp;
  const payers = present.filter(n => n !== "Benjie");
  const benjiePresent = present.includes("Benjie");
  let cpa = 0, totalEst = 0;
  if (total != null) { cpa = total / present.length; totalEst = total; }
  else if (ppCost != null) { cpa = ppCost; totalEst = ppCost * present.length; }
  const benjieExtra = benjiePresent && payers.length > 0 ? cpa / payers.length : 0;

  ALL_NAMES.forEach(n => {
    if (n === "Benjie") { perPerson[n] = 0; }
    else if (present.includes(n)) { perPerson[n] = cpa + benjieExtra; }
    else { perPerson[n] = 0; }
  });
  return { ...exp, perPerson, totalEst };
}

function e(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'className') el.className = v;
    else if (k === 'style') Object.assign(el.style, v);
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  });
  children.flat(Infinity).forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  });
  return el;
}

function tag(cls, text) {
  return e('span', {className: 'tag ' + cls}, text);

  while ((match = urlRegex.exec(text)) !== null) {
    if (match.index > last) div.appendChild(document.createTextNode(text.slice(last, match.index)));
    const a = document.createElement('a');
    a.href = match[0];
    if (match[0].startsWith('http')) a.target = '_blank';
    const href = match[0];
    a.textContent = href.startsWith('mailto:') ? href.replace('mailto:','') :
                    href.startsWith('tel:') ? href.replace('tel:','') :
                    href.replace('https://','').replace('http://','').replace(/\/$/,'');
    a.style.color = 'var(--green)';
    a.style.wordBreak = 'break-all';
    div.appendChild(a);
    last = match.index + match[0].length;
  }
  if (last < text.length) div.appendChild(document.createTextNode(text.slice(last)));
  return div;
}

// ── TABS ──────────────────────────────────────────────────────────────────────

function showTab(id) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    const ids = ['itin','contacts','hotel','flights','crew','info'];
    b.classList.toggle('active', ids[i] === id);
  });
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.add('hidden'));
  const target = document.getElementById('tab-' + id);
  target.classList.remove('hidden');
  if (!target.dataset.rendered) {
    renders[id]();
    target.dataset.rendered = '1';
  }
}

// ── ITINERARY ────────────────────────────────────────────────────────────────

function renderItin() {
  const container = document.getElementById('tab-itin');
  container.appendChild(e('h2', {style:{fontFamily:"Cormorant Garamond,serif",fontSize:'24px',marginBottom:'4px'}}, 'Itinerary'));
  container.appendChild(e('div', {className:'warning-banner'}, '⚠️ ', e('b',{},'Still to book:'), ' Escala25 climbing · Surf lesson (Sat) · Group dinners Fri & Sat · VIP late night Sat'));

  DAYS.forEach(day => {
    const evs = INITIAL_ITINERARY[day.date] || [];
    const booked = evs.filter(ev => ev.booked).length;
    
    const dayCard = e('div', {className:'card', style:{marginBottom:'14px'}});
    const hdr = e('div', {className:'card-header'});
    hdr.appendChild(e('div', {style:{display:'flex',gap:'10px',alignItems:'center',flexWrap:'wrap'}},
      e('span', {style:{fontFamily:"Cormorant Garamond,serif",fontSize:'18px',fontWeight:'700'}}, day.label),
      e('span', {style:{fontSize:'10px',color:'var(--green-mid)',letterSpacing:'1px',textTransform:'uppercase'}}, day.theme)
    ));
    hdr.appendChild(e('span', {style:{fontSize:'11px',color:'var(--text-soft)'}}, booked + '/' + evs.length + ' booked'));
    dayCard.appendChild(hdr);

    evs.forEach(ev => {
      const needsBooking = !ev.booked && ev.notes && ev.notes.includes('NEEDS BOOKING');
      const evEl = e('div', {className:'event' + (ev.booked ? ' booked' : needsBooking ? ' needs-booking' : '')});
      evEl.appendChild(e('div', {className:'event-icon'}, ev.type.split(' ')[0]));
      const body = e('div', {className:'event-body'});
      
      const titleRow = e('div', {className:'event-title'});
      titleRow.appendChild(document.createTextNode(ev.title));
      if (ev.time) titleRow.appendChild(e('span', {className:'event-time'}, ev.time));
      if (ev.booked) titleRow.appendChild(tag('tag-green', '✓ Booked'));
      else if (needsBooking) titleRow.appendChild(tag('tag-red', '⚠️ Book Now'));
      else titleRow.appendChild(tag('tag-grey', 'TBC'));
      body.appendChild(titleRow);
      
      if (ev.location) body.appendChild(e('div', {className:'event-location'}, '📍 ' + ev.location));
      if (ev.notes) {
        const notes = e('div', {className:'event-notes'});
        notes.appendChild(linkify(ev.notes));
        body.appendChild(notes);
      }
      if (ev.links && ev.links.length) {
        const chips = e('div', {className:'link-chips'});
        ev.links.forEach(l => {
          const a = e('a', {className:'link-chip', href:l.url, target:'_blank'}, l.label + ' ↗');
          chips.appendChild(a);
        });
        body.appendChild(chips);
      }
      evEl.appendChild(body);
      dayCard.appendChild(evEl);
    });
    container.appendChild(dayCard);
  });
}

function renderInfo() {

  container.appendChild(e('h2', {style:{fontFamily:"Cormorant Garamond,serif",fontSize:'24px',marginBottom:'4px'}}, 'Info & Budget'));
  container.appendChild(e('p', {style:{fontSize:'13px',color:'var(--text-soft)',marginBottom:'18px'}}, 'Per-person costs · Benjie pays nothing · estimates only'));

  const infoGrid = e('div', {className:'info-grid'});
  [
    {icon:'🌡️', title:'Weather', text:'May: 18-24°C, sunny. Light jacket evenings.'},
    {icon:'💶', title:'Currency', text:'Euro (€). Cards everywhere. ATMs plentiful.'},
    {icon:'🚕', title:'Transport', text:'Uber/Bolt cheap. Airport to hotel ~€20.'},
    {icon:'🏨', title:'Hotel', text:'Contact Flores GH 48hrs before. No lift!'},
    {icon:'⏰', title:'Time Zone', text:'WET (UTC+1 in May) = same as UK/BST.'},
    {icon:'🚨', title:'Emergency', text:'112 · UK Embassy: +351 21 392 4000'},
  ].forEach(c => {

    card.appendChild(e('div', {className:'info-card-title'}, c.title));
    card.appendChild(e('div', {className:'info-card-text'}, c.text));
    infoGrid.appendChild(card);
  });
  container.appendChild(infoGrid);

  // Budget per person
  const costs = EXPENSES.map(calcExp);
  const totals = {};
  ALL_NAMES.forEach(n => { totals[n] = costs.reduce((s,ex) => s+(ex.perPerson[n]||0), 0); });

  container.appendChild(e('div', {style:{fontSize:'11px',color:'var(--green)',fontWeight:'700',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'10px'}}, '💶 Estimated Total Per Person'));
  const summGrid = e('div', {className:'summary-grid'});
  ALL_NAMES.forEach(name => {
    const isBenjie = name === 'Benjie';
    const card = e('div', {className:'summary-card' + (isBenjie?' benjie':'')});
    card.appendChild(e('div', {className:'summary-label'+(isBenjie?' benjie':'')}, isBenjie ? '💍 Benjie' : name.split(' ')[0]));
    card.appendChild(e('div', {className:'summary-value'+(isBenjie?' benjie':'')}, isBenjie ? '€0' : '~€'+Math.round(totals[name])));
    card.appendChild(e('div', {className:'summary-sub'}, isBenjie ? 'Groom goes free 🎉' : 'estimated'));
    summGrid.appendChild(card);
  });
  container.appendChild(summGrid);

  // Breakdown by category
  const categories = [...new Set(EXPENSES.map(ex => ex.category))];
  categories.forEach(cat => {
    const card = e('div', {className:'card', style:{marginBottom:'12px', overflowX:'auto'}});
    const hdr = e('div', {style:{background:'var(--green-light)',padding:'10px 16px',borderBottom:'1px solid var(--border)'}});
    hdr.appendChild(e('span', {style:{fontFamily:"Cormorant Garamond,serif",fontSize:'17px',fontWeight:'700'}}, cat));
    card.appendChild(hdr);
    
    const table = e('table', {className:'budget-table'});
    const thead = e('thead');
    const hrow = e('tr');
    hrow.appendChild(e('th', {style:{textAlign:'left'}}, 'Expense'));
    ALL_NAMES.forEach(n => hrow.appendChild(e('th', {style:{color: n==='Benjie'?'var(--green)':'var(--text-soft)'}}, n==='Benjie'?'💍':n.split(' ')[0])));
    hrow.appendChild(e('th', {}, 'Total'));
    thead.appendChild(hrow);
    table.appendChild(thead);
    
    const tbody = e('tbody');
    costs.filter(ex => ex.category === cat).forEach(ex => {
      const row = e('tr');
      const td = e('td', {});
      td.appendChild(e('div', {style:{color:'var(--text-mid)',fontSize:'11px'}}, ex.label));
      if (ex.note) td.appendChild(e('div', {style:{color:'var(--text-soft)',fontSize:'10px',marginTop:'2px'}}, ex.note));
      row.appendChild(td);
      ALL_NAMES.forEach(n => {
        const val = ex.perPerson[n]||0;
        const isBenjie = n==='Benjie';
        row.appendChild(e('td', {}, 
          isBenjie ? e('span', {style:{color:'var(--green)',fontWeight:'700'}}, '€0') :
          val > 0 ? e('span', {style:{color:'var(--gold)',fontWeight:'600'}}, '€'+Math.round(val)) :
          e('span', {style:{color:'var(--border-mid)'}}, '—')
        ));
      });
      row.appendChild(e('td', {style:{color:'var(--text-soft)',fontWeight:'600'}}, ex.totalEst ? '~€'+Math.round(ex.totalEst) : 'TBC'));
      tbody.appendChild(row);
    });
    
    // Subtotal row
    const subrow = e('tr', {className:'budget-subtotal'});
    subrow.appendChild(e('td', {style:{color:'var(--text-soft)',fontSize:'11px',fontWeight:'700',paddingLeft:'14px'}}, 'Subtotal'));
    ALL_NAMES.forEach(n => {
      const sub = costs.filter(ex => ex.category===cat).reduce((s,ex) => s+(ex.perPerson[n]||0), 0);
      const isBenjie = n==='Benjie';
      subrow.appendChild(e('td', {style:{color:isBenjie?'var(--green)':sub>0?'var(--text-mid)':'var(--border-mid)',fontWeight:'700'}},
        isBenjie ? '€0' : sub>0 ? '~€'+Math.round(sub) : '—'
      ));
    });
    subrow.appendChild(e('td', {}));
    tbody.appendChild(subrow);
    table.appendChild(tbody);
    card.appendChild(table);
    container.appendChild(card);
  });
}
