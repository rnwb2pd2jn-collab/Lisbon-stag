function linkify(text) {
if (!text) return null;
const parts = text.split(/(https?://[^\s]+|mailto:[^\s]+|tel:[^\s]+)/g);
return parts.map((p, i) => {
if (p.startsWith(“http”) || p.startsWith(“mailto:”) || p.startsWith(“tel:”)) {
const label = p.startsWith(“mailto:”) ? p.replace(“mailto:”, “”) : p.startsWith(“tel:”) ? p.replace(“tel:”, “”) : p.replace(/^https?:///, “”).replace(//$/, “”);
return <a key={i} href={p} target={p.startsWith(“http”) ? “_blank” : undefined} rel=“noreferrer” style={{ color: “#8a6a10”, textDecoration: “underline”, wordBreak: “break-all” }}>{label}</a>;
}
return <span key={i}>{p}</span>;
});
}

function calcExp(exp) {
const { total, ppCost, present } = exp;
const payers = present.filter(n => n !== “Benjie”);
const benjiePresent = present.includes(“Benjie”);
let cpa = 0, totalEst = 0;
if (total != null) { cpa = total / present.length; totalEst = total; }
else if (ppCost != null) { cpa = ppCost; totalEst = ppCost * present.length; }
const benjieExtra = benjiePresent && payers.length > 0 ? cpa / payers.length : 0;
const perPerson = {};
// All names get a slot — Benjie always 0, payers get their share + Benjie’s redistributed bit
ALL_NAMES.forEach(n => {
if (n === “Benjie”) { perPerson[n] = 0; }
else if (present.includes(n)) { perPerson[n] = cpa + benjieExtra; }
else { perPerson[n] = 0; }
});
return { …exp, perPerson, totalEst };
}

          <p style={{ margin:"3px 0 0", color:"#6a5f50", fontSize:13 }}>All flight numbers in one place. Tap to track live.</p>
        </div>
        {[{ label:"✈️ ARRIVALS INTO LISBON", data:FLIGHTS_IN, color:"#1a5fa8" }, { label:"🛫 DEPARTURES FROM LISBON", data:FLIGHTS_OUT, color:"#f59e0b" }].map(({ label, data, color }) => (

            <div style={{ display:"grid", gap:7 }}>

                    <div style={{ fontWeight:600, fontSize:13, color:"#1a1410" }}>{f.name}</div>
                    <div style={{ fontSize:11, color:"#8a7f70", marginTop:1 }}>{f.datetime}</div>
                    {f.note && <div style={{ fontSize:11, color:"#8a7f70", marginTop:1, fontStyle:"italic" }}>{f.note}</div>}
                  </div>
                  <div style={{ flex:1, display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                    <a href={`https://www.flightradar24.com/data/flights/${f.flight.toLowerCase().replace(/\s/g,"")}`} target="_blank" rel="noreferrer"
                      style={{ fontFamily:"monospace", fontSize:13, fontWeight:700, color:f.status === "confirmed" ? "#8a6a10" : "#7a6f60", background:f.status === "confirmed" ? "#8a6a1015" : "#e8e3d8", padding:"2px 9px", borderRadius:6, border:`1px solid ${f.status === "confirmed" ? "#8a6a1033" : "#ccc4b0"}`, letterSpacing:1, textDecoration:"none" }}>
                      {f.flight} ↗
                    </a>
                    <span style={{ fontSize:12, color:"#8a7f70" }}>{f.route}</span>
                    {f.status === "confirmed" ? <Tag color="green">✓</Tag> : <Tag color="grey">TBC</Tag>}
                  </div>
                </div>
              ))}
            </div>
          </div>
        ))}
        <div style={{ background:"#0d1a10", border:"1px solid #1a3020", borderRadius:10, padding:"11px 14px", fontSize:12, color:"#006600", lineHeight:1.6 }}>
          💡 Flight numbers above link directly to <a href="https://www.flightradar24.com" target="_blank" rel="noreferrer" style={{ color:"#006600" }}>FlightRadar24</a> for live tracking. Still needed: Benjie's exact TAP flight number · Rob's details.
        </div>
      </div>
    )}

    {/* ── CREW ── */}
    {tab === "crew" && (
      <div>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:16, flexWrap:"wrap", gap:10 }}>
          <div>
            <h2 style={{ margin:0, fontFamily:"'Cormorant Garamond',serif", fontSize:24, color:"#1a1410" }}>The Crew</h2>
            <p style={{ margin:"3px 0 0", color:"#6a5f50", fontSize:13 }}>{confirmed}/{crew.length} confirmed · {crew.length - confirmed} pending</p>
          </div>
          <Btn onClick={() => { setPf({ name:"", role:"guest", arrival:"", departure:"", flightIn:null, flightOut:null, notes:"", confirmed:false }); setPm("new"); }}>+ Add Person</Btn>
        </div>
        {/* Arrival timeline */}
        <div style={{ background:"#ffffff", border:"1px solid #1e1e1e", borderRadius:12, padding:"13px 16px", marginBottom:16 }}>
          <div style={{ fontSize:10, letterSpacing:2, color:"#8a6a10", fontWeight:700, textTransform:"uppercase", marginBottom:10 }}>Arrival Timeline</div>
          {[
            { day:"Wed 6 May", time:"07:25", who:"Harry", note:"Etihad EY99 from AUH" },
            { day:"Thu 7 May", time:"10:50", who:"Benjie", note:"TAP from LHR" },
            { day:"Thu 7 May", time:"21:35", who:"Laurie + Amon", note:"TAP TP1357 from LHR" },
            { day:"Fri 8 May", time:"09:25", who:"John (Gilmore)", note:"EZY3321 from EDI" },
            { day:"Fri 8 May", time:"11:55", who:"Paul (PeeWee)", note:"easyJet from MAN" },
            { day:"TBC", time:"—", who:"Rob", note:"TBC" },
          ].map((r, i, a) => (
            <div key={i} style={{ display:"flex", alignItems:"center", gap:12, padding:"6px 0", borderBottom:i < a.length-1 ? "1px solid #1a1a1a" : "none" }}>
              <div style={{ width:76, fontSize:12, color:"#8a6a10", fontWeight:600, flexShrink:0 }}>{r.day}</div>
              <div style={{ width:40, fontSize:12, color:"#8a7f70", flexShrink:0 }}>{r.time}</div>
              <div style={{ flex:1 }}><span style={{ fontSize:13, color:"#4a3f30", fontWeight:500 }}>{r.who}</span><span style={{ fontSize:12, color:"#7a6f60", marginLeft:8 }}>{r.note}</span></div>
            </div>
          ))}
        </div>
        <div style={{ display:"grid", gap:10 }}>
          {crew.map(p => (
            <div key={p.id} style={{ background:"#ffffff", border:`1px solid ${p.id === 1 ? "#8a6a102a" : "#d8d0bc"}`, borderRadius:12, padding:"13px 15px" }}>
              <div style={{ display:"flex", gap:12, alignItems:"flex-start", flexWrap:"wrap" }}>
                <div style={{ width:36, height:36, borderRadius:"50%", background:"#fffae8", border:"1px solid #c9a84c2a", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, flexShrink:0 }}>{rIcon[p.role] || "🙋"}</div>
                <div style={{ flex:1, minWidth:150 }}>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:6, alignItems:"center", marginBottom:5 }}>
                    <span style={{ fontWeight:600, fontSize:15, color:"#1a1410" }}>{p.name}</span>
                    {rLabel[p.role] && <Tag color="gold">{rLabel[p.role]}</Tag>}
                    {p.confirmed ? <Tag color="green">✓ Confirmed</Tag> : <Tag color="grey">Pending</Tag>}
                  </div>
                  <FlightBadge f={p.flightIn} direction="in" />
                  <FlightBadge f={p.flightOut} direction="out" />
                  {p.notes && <div style={{ fontSize:11, color:"#8a7f70", marginTop:5, fontStyle:"italic" }}>{p.notes}</div>}
                </div>
                <div style={{ display:"flex", gap:5 }}>
                  <Btn v="ghost" sm onClick={() => { setPf({ ...p }); setPm(p.id); }}>Edit</Btn>
                  <Btn v="danger" sm onClick={() => setCrew(ps => ps.filter(x => x.id !== p.id))}>✕</Btn>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    )}

    {/* ── INFO ── */}
    {tab === "info" && (
      <InfoTab budget={budget} setBudget={setBudget} fStyle={fStyle} lStyle={lStyle} />
    )}
  </div>

  {/* PERSON MODAL */}
  <Modal open={!!pm} onClose={() => setPm(null)} title={pm === "new" ? "Add Person" : "Edit Person"}>
    <F label="Name" value={pf.name||""} onChange={e => setPf(f => ({ ...f, name:e.target.value }))} />
    <F label="Role" select opts={["groom","best_man","organiser","guest"]} value={pf.role||"guest"} onChange={e => setPf(f => ({ ...f, role:e.target.value }))} />
    <F label="Arrival" value={pf.arrival||""} onChange={e => setPf(f => ({ ...f, arrival:e.target.value }))} placeholder="e.g. Thu 7 May, 21:35" />
    <F label="Departure" value={pf.departure||""} onChange={e => setPf(f => ({ ...f, departure:e.target.value }))} />
    <F label="Notes" textarea value={pf.notes||""} onChange={e => setPf(f => ({ ...f, notes:e.target.value }))} />
    <label style={{ display:"flex", gap:8, alignItems:"center", marginBottom:18, cursor:"pointer", color:"#6a5f50", fontSize:13 }}>
      <input type="checkbox" checked={!!pf.confirmed} onChange={e => setPf(f => ({ ...f, confirmed:e.target.checked }))} /> Confirmed coming
    </label>
    <div style={{ display:"flex", gap:8, justifyContent:"flex-end" }}>
      <Btn v="ghost" onClick={() => setPm(null)}>Cancel</Btn>
      <Btn onClick={savePerson}>Save</Btn>

  </Modal>

  {/* EVENT MODAL */}
  <Modal open={!!em} onClose={() => setEm(null)} title={em?.idx === null ? "Add Event" : "Edit Event"}>
    <F label="Title" value={ef.title||""} onChange={e => setEf(f => ({ ...f, title:e.target.value }))} />

    <F label="Time" type="time" value={ef.time||""} onChange={e => setEf(f => ({ ...f, time:e.target.value }))} />
    <F label="Location" value={ef.location||""} onChange={e => setEf(f => ({ ...f, location:e.target.value }))} />
    <F label="Notes" textarea value={ef.notes||""} onChange={e => setEf(f => ({ ...f, notes:e.target.value }))} placeholder="Any URLs typed here will become clickable automatically." />
    <label style={{ display:"flex", gap:8, alignItems:"center", marginBottom:18, cursor:"pointer", color:"#6a5f50", fontSize:13 }}>
      <input type="checkbox" checked={!!ef.booked} onChange={e => setEf(f => ({ ...f, booked:e.target.checked }))} /> Booked & confirmed
    </label>

      <Btn v="ghost" onClick={() => setEm(null)}>Cancel</Btn>
      <Btn onClick={saveEvent}>Save</Btn>
